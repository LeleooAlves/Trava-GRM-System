<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Super Extensão GRM</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background-color: #1a1a1a; 
      width: 335px; /* Fits both popups */
      height: 600px;
      display: flex;
      flex-direction: column;
    }
    .tabs {
      display: flex;
      background-color: #222;
      padding: 8px;
    }
    .tab-btn {
      flex: 1;
      border: none;
      padding: 10px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.2s ease;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    /* Tab Keyword (Trava) */
    .tab-btn.tab-trava {
      background: linear-gradient(135deg, #ee4d2d, #ff6b4a);
      box-shadow: 0 2px 8px rgba(238, 77, 45, 0.3);
      margin-right: 4px;
    }
    .tab-btn.tab-trava:hover {
      background: linear-gradient(135deg, #ff6b4a, #ff8c6f);
    }
    .tab-btn.tab-trava.inactive {
      background: #333;
      box-shadow: none;
      color: #aaa;
    }

    /* Tab DentrodaKW (Relevancia) */
    .tab-btn.tab-relevancia {
      background: #0d6efd;
      box-shadow: 0 2px 8px rgba(13, 110, 253, 0.3);
      color: #fff;
      margin-left: 4px;
    }
    .tab-btn.tab-relevancia:hover {
      background: #0b5ed7;
    }
    .tab-btn.tab-relevancia.inactive {
      background: #333;
      box-shadow: none;
      color: #aaa;
    }

    iframe {
      border: none;
      width: 100%;
      flex-grow: 1;
      height: 550px;
    }
    
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="tabs">
    <button id="btn-trava" class="tab-btn tab-trava">Contador</button>
    <button id="btn-relevancia" class="tab-btn tab-relevancia inactive">Select</button>
  </div>
  
  <iframe id="frame-trava" src="popup_trava.html"></iframe>
  <iframe id="frame-relevancia" src="popup_relevancia.html" class="hidden"></iframe>

  <script src="index.js"></script>
</body>
</html>
